<svg xmlns="http://www.w3.org/2000/svg" width="160" height="256" viewBox="0 0 160 256">
  <rect width="160" height="256" fill="#BCAAA4" />

  <!-- Desk rows (rows 0..5) -->
  <!-- desk top: x+4, y+8, width 24, height 20. legs: small squares -->
  <g fill="#8B5A2B">
    <!-- row 0 -->
    <rect x="4" y="8" width="24" height="20" />
    <rect x="36" y="8" width="24" height="20" />
    <rect x="68" y="8" width="24" height="20" />
    <rect x="100" y="8" width="24" height="20" />
    <rect x="132" y="8" width="24" height="20" />
    <!-- row 1 -->
    <rect x="4" y="40" width="24" height="20" />
    <rect x="36" y="40" width="24" height="20" />
    <rect x="68" y="40" width="24" height="20" />
    <rect x="100" y="40" width="24" height="20" />
    <rect x="132" y="40" width="24" height="20" />
    <!-- row 2 -->
    <rect x="4" y="72" width="24" height="20" />
    <rect x="36" y="72" width="24" height="20" />
    <rect x="68" y="72" width="24" height="20" />
    <rect x="100" y="72" width="24" height="20" />
    <rect x="132" y="72" width="24" height="20" />
    <!-- row 3 -->
    <rect x="4" y="104" width="24" height="20" />
    <rect x="36" y="104" width="24" height="20" />
    <rect x="68" y="104" width="24" height="20" />
    <rect x="100" y="104" width="24" height="20" />
    <rect x="132" y="104" width="24" height="20" />
    <!-- row 4 -->
    <rect x="4" y="136" width="24" height="20" />
    <rect x="36" y="136" width="24" height="20" />
    <rect x="68" y="136" width="24" height="20" />
    <rect x="100" y="136" width="24" height="20" />
    <rect x="132" y="136" width="24" height="20" />
    <!-- row 5 -->
    <rect x="4" y="168" width="24" height="20" />
    <rect x="36" y="168" width="24" height="20" />
    <rect x="68" y="168" width="24" height="20" />
    <rect x="100" y="168" width="24" height="20" />
    <rect x="132" y="168" width="24" height="20" />
  </g>

  <!-- desk legs (darker) -->
  <g fill="#6D4C41">
    <!-- row 0 legs -->
    <rect x="6" y="18" width="4" height="4" />
    <rect x="22" y="18" width="4" height="4" />
    <rect x="38" y="50" width="4" height="4" />
    <rect x="54" y="50" width="4" height="4" />
    <!-- add legs across rows by pattern -->
    <rect x="6" y="50" width="4" height="4" />
    <rect x="22" y="50" width="4" height="4" />
    <rect x="38" y="82" width="4" height="4" />
    <rect x="54" y="82" width="4" height="4" />
    <rect x="6" y="82" width="4" height="4" />
    <rect x="22" y="82" width="4" height="4" />
    <rect x="6" y="114" width="4" height="4" />
    <rect x="22" y="114" width="4" height="4" />
    <rect x="6" y="146" width="4" height="4" />
    <rect x="22" y="146" width="4" height="4" />
    <rect x="6" y="178" width="4" height="4" />
    <rect x="22" y="178" width="4" height="4" />
  </g>

  <!-- front row (row 7) -->
  <rect x="0" y="224" width="160" height="32" fill="#6D4C41" />

  <!-- subtle grid lines -->
  <g stroke="#000" stroke-opacity="0.08" stroke-width="1">
    <!-- vertical lines -->
    <line x1="32" y1="0" x2="32" y2="256" />
    <line x1="64" y1="0" x2="64" y2="256" />
    <line x1="96" y1="0" x2="96" y2="256" />
    <line x1="128" y1="0" x2="128" y2="256" />
    <!-- horizontal lines -->
    <line x1="0" y1="32" x2="160" y2="32" />
    <line x1="0" y1="64" x2="160" y2="64" />
    <line x1="0" y1="96" x2="160" y2="96" />
    <line x1="0" y1="128" x2="160" y2="128" />
    <line x1="0" y1="160" x2="160" y2="160" />
    <line x1="0" y1="192" x2="160" y2="192" />
    <line x1="0" y1="224" x2="160" y2="224" />
  </g>
</svg>
