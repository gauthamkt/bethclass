<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="btnGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#45a049;stop-opacity:1" />
    </linearGradient>
    <filter id="btnShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.6"/>
    </filter>
  </defs>
  
  <!-- Button background -->
  <rect x="0" y="0" width="200" height="60" rx="8" fill="url(#btnGradient)" filter="url(#btnShadow)"/>
  
  <!-- Button border -->
  <rect x="0" y="0" width="200" height="60" rx="8" fill="none" stroke="#2E7D32" stroke-width="2"/>
  
  <!-- Text -->
  <text x="100" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">
    Try Again
  </text>
  
  <!-- Arrow icon (curved) -->
  <path d="M 30 25 Q 40 20, 45 30 Q 40 35, 30 30" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
