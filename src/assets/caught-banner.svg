<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150" width="400" height="150">
  <!-- Background -->
  <defs>
    <linearGradient id="bannerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC0000;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.8"/>
    </filter>
  </defs>
  
  <!-- Main banner background -->
  <rect width="400" height="150" fill="url(#bannerGradient)" filter="url(#shadow)"/>
  
  <!-- Border -->
  <rect x="5" y="5" width="390" height="140" fill="none" stroke="#FFFF00" stroke-width="4"/>
  
  <!-- Inner border -->
  <rect x="10" y="10" width="380" height="130" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Top accent bar -->
  <rect x="0" y="0" width="400" height="20" fill="#000000" opacity="0.3"/>
  
  <!-- Bottom accent bar -->
  <rect x="0" y="130" width="400" height="20" fill="#000000" opacity="0.3"/>
  
  <!-- CAUGHT text -->
  <text x="200" y="85" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#FFFF00" text-anchor="middle" filter="url(#shadow)" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.8); font-style: italic;">
    CAUGHT!
  </text>
  
  <!-- Subtitle -->
  <text x="200" y="125" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle" font-weight="bold">
    Game Over
  </text>
  
  <!-- Decorative elements - stars -->
  <circle cx="40" cy="40" r="8" fill="#FFFF00"/>
  <circle cx="360" cy="40" r="8" fill="#FFFF00"/>
  <circle cx="40" cy="110" r="8" fill="#FFFF00"/>
  <circle cx="360" cy="110" r="8" fill="#FFFF00"/>
</svg>
